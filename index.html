<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMP602: Oracle & Architect</title>
    <style>
        :root { --bg: #050505; --panel: #111; --text: #888; --border: #222; --accent: #00e5ff; }
        .theme-cyan { --accent: #00e5ff; } .theme-amber { --accent: #ffb300; } .theme-green { --accent: #39ff14; } .theme-magenta { --accent: #ff00ff; }
        body.cologne-theme { --bg: #03080a; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 30px 30px; }
        body.paris-theme { --bg: #0d0a08; }
        body.paris-theme::before { content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 4px, 4px 100%; pointer-events: none; z-index: 100; opacity: 0.4; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: background 0.5s ease; overflow-x: hidden; }
        .container { max-width: 1400px; width: 100%; display: grid; grid-template-columns: 480px 1fr; gap: 40px; }
        .module { background: var(--panel); border: 2px solid var(--border); padding: 35px; border-radius: 16px; border-top: 10px solid var(--accent); box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.05); position: relative; transition: transform 0.1s ease; }
        h1, h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 5px; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin: 0 0 30px 0; text-shadow: 0 0 15px var(--accent); }
        label { display: block; font-size: 0.65rem; margin-bottom: 8px; color: var(--accent); font-weight: 900; letter-spacing: 1px; }
        input[type=range] { width: 100%; margin-bottom: 25px; accent-color: var(--accent); cursor: crosshair; }
        input[type=text], select { background: #000; color: var(--accent); border: 2px solid var(--border); padding: 16px; width: calc(100% - 36px); margin-bottom: 20px; font-family: inherit; font-size: 0.85rem; border-radius: 6px; outline: none; }
        button { background: #181818; color: var(--accent); border: 2.5px solid var(--accent); padding: 18px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.05s; position: relative; border-radius: 8px; box-shadow: 0 7px 0 #000, 0 12px 20px rgba(0,0,0,0.6); margin-top: 15px; letter-spacing: 2px; }
        button:active { transform: translateY(5px); box-shadow: 0 2px 0 #000; filter: brightness(1.4); }
        button.action { background: var(--accent); color: #000; border: 2.5px solid #000; }
        .viz-stack { display: grid; grid-template-rows: repeat(3, 170px); gap: 20px; margin-bottom: 15px; }
        canvas { background: #000; border: 2px solid #222; width: 100%; height: 100%; border-radius: 8px; }
        #c2-wrap { position: relative; overflow: visible; }
        .hud-panel { background: #000; border: 3px solid var(--accent); padding: 30px; margin-top: 30px; border-radius: 12px; box-shadow: inset 0 0 40px rgba(0,0,0,1); }
        .hud-target { font-size: 1.6rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--accent); letter-spacing: 3px; }
        .matrix-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; margin-top: 40px; background: #000; border-radius: 10px; overflow: hidden; }
        .matrix-table th { background: #1a1a1a; color: var(--accent); padding: 18px; border: 1px solid var(--border); text-align: left; }
        .matrix-table td { border: 1px solid var(--border); padding: 18px; color: #ccc; vertical-align: top; }
        @keyframes tear { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, 0px); } 100% { transform: translate(1px, -1px); } }
        .shaking { animation: tear 0.05s infinite; }
        .blooming { filter: brightness(1.3) contrast(1.2); }
    </style>
</head>
<body class="cologne-theme">

<h1 style="margin-bottom: 40px;">EMP602: ORACLE & ARCHITECT v15.1</h1>

<div class="container">
    <div class="module" id="oracle-mod">
        <h2>I. THE ORACLE</h2>
        <label>ONSET</label><input type="range" min="0" max="100" value="15" id="onset">
        <label>MASS (SLAB)</label><input type="range" min="0" max="100" value="50" id="mass">
        <label>TERMINATION</label><input type="range" min="0" max="100" value="30" id="term">
        <label>GRIT (DEBRIS)</label><input type="range" min="0" max="100" value="20" id="grit">
        <div class="viz-stack"><canvas id="c1"></canvas><div id="c2-wrap"><canvas id="c2"></canvas></div><canvas id="c3"></canvas></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <button onclick="takeSnapshot('BEFORE')">Capture BEFORE</button>
            <button onclick="takeSnapshot('AFTER')">Capture AFTER</button>
        </div>
    </div>
    <div class="module">
        <h2>II. THE ARCHITECT</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div>
                <label>PHILOSOPHY</label><select id="mode" onchange="updatePhilosophy()"><option value="cologne">Cologne (Surgical)</option><option value="paris">Paris (Materialist)</option></select>
                <label>PALETTE</label><select id="palette" onchange="updateColors()"></select>
                <label>SHARD ID</label><input id="shardName" placeholder="e.g. MS20_RUB_01">
                <label>PRE-PROCESS</label><select id="preState"><option>Glassy/Pure</option><option>Static/Heavy</option><option>Rough/Fragmented</option><option>Unstable/Liquid</option></select>
            </div>
            <div>
                <label>P1: SPACE</label><input id="p1" placeholder="Plugin Name"><label>P2: TEXTURE</label><input id="p2" placeholder="Plugin Name"><label>P3: DESTRUCT</label><input id="p3" placeholder="Plugin Name">
            </div>
        </div>
        <button class="action" id="rollBtn" onclick="roll()">ROLL COMPOSITIONAL LAW</button>
        <div class="hud-panel" id="hud"><h2>SIGNAL DECODER</h2><div id="hud-body" style="color:#666; font-size:0.85rem;">AWAITING SIGNAL INITIALIZATION...</div></div>
        <div id="capturePanel" style="display:none; border:2.5px solid var(--accent); padding:20px; margin-top:20px; border-radius:12px;">
            <label>POST-PROCESS:</label><select id="postState"><option>Eroded</option><option>Dissolved</option><option>Solidified</option><option>Shattered</option><option>Purified</option></select>
            <button onclick="commitLog()" class="action">COMMIT TO LOG</button>
        </div>
        <button onclick="exportCSV()" style="margin-top:25px; font-size:0.7rem; color:#555;">Export Log (.csv)</button>
    </div>
</div>
<table class="matrix-table"><thead><tr><th>#</th><th>Shard</th><th>Temporal</th><th>P1 (Space)</th><th>P2 (Texture)</th><th>P3 (Destruct)</th><th>Pre</th><th>Post</th></tr></thead><tbody id="logBody"></tbody></table>

<script>
    const colPal = {"Cyan":"#00e5ff","Lab Green":"#39ff14","UV Violet":"#bc13fe","Cold White":"#f0f0f0"}, parPal = {"Oxide Red":"#ff4500","Toxic Amber":"#ffb300","Carbon Grey":"#777777","Burnt Orange":"#cc5500"};
    const spaceLaws = [["ANCHOIC", "Zero environmental energy. Dead signal."], ["DIFFUSE", "Widely dispersed, non-directional wash."], ["INTIMATE", "Place sound within personal periphonic space."], ["POINT-SOURCE", "Fixed, sharp, single coordinate."]];
    const textureLaws = [["FRACTURED", "Broken, glitched, intermittent grain."], ["CONTINUANT", "Stable, steady-state spectral density."], ["ITERATIVE", "Rapidly repeated varying elements."], ["HOLLOW", "Spectral body removed; edges only."]];
    const destructLaws = [["PRISTINE", "Zero artifacts. Absolute precision."], ["ERODED", "Material failure. Old, worn, low-fi."], ["SATURATED", "Total harmonic distortion. Excess energy."], ["TONAL-NOISE", "Noise forced into self-oscillation."]];
    const tempLaws = ["LINEAR SUCCESSION: End-to-end.", "ELIDED OVERLAP: Transition overlap.", "VERTICAL STRATIFICATION: Layered stratum."];

    let currentRoll = null, time = 0, eventCount = 0; const waterfall = [];

    function updatePhilosophy() {
        const m = document.getElementById('mode').value; document.body.className = m + '-theme';
        const palSelect = document.getElementById('palette'); palSelect.innerHTML = '';
        const list = m === 'cologne' ? colPal : parPal;
        for (let n in list) { let opt = document.createElement('option'); opt.value = list[n]; opt.innerText = n; palSelect.appendChild(opt); }
        updateColors();
    }
    function updateColors() { document.documentElement.style.setProperty('--accent', document.getElementById('palette').value); }

    function animate() {
        time += 0.05;
        const o=document.getElementById('onset').value/100, m=document.getElementById('mass').value/100, t=document.getElementById('term').value/100, g=document.getElementById('grit').value/100;
        const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
        const mode = document.getElementById('mode').value;
        const mod = document.getElementById('oracle-mod');
        if(mode === 'paris' && g > 0.6) mod.classList.add('shaking'); else mod.classList.remove('shaking');
        if(mode === 'cologne' && m > 0.6) mod.classList.add('blooming'); else mod.classList.remove('blooming');

        const c1 = document.getElementById('c1').getContext('2d');
        const w=800, h=170; c1.canvas.width=w; c1.canvas.height=h;
        c1.clearRect(0,0,w,h); c1.strokeStyle=accent; c1.lineWidth=mode==='cologne' ? 2.5 + m*6 : 3;
        if(mode==='cologne') { c1.shadowBlur=m*35; c1.shadowColor=accent; }
        c1.beginPath();
        for(let x=0; x<w; x++){
            let p=x/w, env=1; if(p<o) env=p/o; else if(p>1-t) env=(1-p)/t;
            let move = mode === 'cologne' ? time*4.5 : time*1.2;
            let noise = mode === 'paris' ? (Math.random()-0.5)*g*70*env : 0;
            let y = h/2 + Math.sin(move + x/(25-m*20))*(m*60*env) + noise;
            if(x==0) c1.moveTo(x,y); else c1.lineTo(x,y);
        }
        c1.stroke();

        const c2 = document.getElementById('c2').getContext('2d');
        c2.canvas.width=w; c2.canvas.height=h; c2.clearRect(0,0,w,h);
        const frame = Array.from({length: 40}, () => (Math.random() < m ? Math.random() : 0));
        waterfall.unshift(frame); if(waterfall.length > 30) waterfall.pop();
        waterfall.forEach((row, yPos) => {
            row.forEach((val, xPos) => {
                if(val > 0) {
                    let slabW = (m*100) * (1-g*0.9);
                    let drift = (Math.random()-0.5)*g*240;
                    c2.fillStyle = accent; c2.globalAlpha = val * (1-yPos/30);
                    c2.fillRect(xPos*(w/40) + drift, yPos*5.5, Math.max(2, slabW), 5);
                }
            });
        });

        const c3 = document.getElementById('c3').getContext('2d');
        c3.canvas.width=w; c3.canvas.height=h; c3.clearRect(0,0,w,h);
        const pulse = 1 + Math.sin(time*2.5)*0.1;
        c3.fillStyle = accent; c3.globalAlpha = 0.2; c3.beginPath();
        for(let x=0; x<w; x++){
            let p=x/w, env=1; if(p<o) env=p/o; else if(p>1-t) env=(1-p)/t;
            c3.lineTo(x, h/2 - (env*m*h*0.45*pulse));
        }
        for(let x=w; x>=0; x--){
            let p=x/w, env=1; if(p<o) env=p/o; else if(p>1-t) env=(1-p)/t;
            c3.lineTo(x, h/2 + (env*m*h*0.45*pulse));
        }
        c3.fill();
        requestAnimationFrame(animate);
    }

    function roll() {
        const p1=document.getElementById('p1').value||"P1", p2=document.getElementById('p2').value||"P2", p3=document.getElementById('p3').value||"P3";
        const r1=Math.floor(Math.random()*4), r2=Math.floor(Math.random()*4), r3=Math.floor(Math.random()*4);
        const sL=spaceLaws[r1], tL=textureLaws[r2], dL=destructLaws[r3];
        const temp = (eventCount === 0) ? "INITIALIZE: Start of Grid (00:00:00)" : tempLaws[Math.floor(Math.random()*3)];
        currentRoll = {shard: document.getElementById('shardName').value||"SHARD", t:temp, p1:sL[0], p2:tL[0], p3:dL[0], pre:document.getElementById('preState').value, mode:document.getElementById('mode').value.toUpperCase()};
        document.getElementById('hud-body').innerHTML = `<div style="margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:5px;"><b>Temporal Law:</b> ${temp}</div><div style="margin-bottom:10px;"><b>P1 Space (${p1}):</b> Target: <span class="hud-target">${sL[0]}</span><br><i style="font-size:0.75rem; color:#aaa;">${sL[1]}</i></div><div style="margin-bottom:10px;"><b>P2 Texture (${p2}):</b> Target: <span class="hud-target">${tL[0]}</span><br><i style="font-size:0.75rem; color:#aaa;">${tL[1]}</i></div><div style="margin-bottom:10px;"><b>P3 Destruct (${p3}):</b> Target: <span class="hud-target">${dL[0]}</span><br><i style="font-size:0.75rem; color:#aaa;">${dL[1]}</i></div>`;
        document.getElementById('capturePanel').style.display='block'; document.getElementById('rollBtn').disabled=true;
    }

    function commitLog() {
        eventCount++;
        const row = `<tr><td>${eventCount}</td><td>${currentRoll.shard}</td><td>${currentRoll.t}</td><td>${currentRoll.p1}</td><td>${currentRoll.p2}</td><td>${currentRoll.p3}</td><td>${currentRoll.pre}</td><td>${document.getElementById('postState').value}</td></tr>`;
        document.getElementById('logBody').insertAdjacentHTML('afterbegin', row);
        document.getElementById('capturePanel').style.display='none'; document.getElementById('rollBtn').disabled=false;
        document.getElementById('hud-body').innerHTML = "SIGNAL DECODER STANDBY";
    }

    function takeSnapshot(label) {
        const m = document.getElementById('mode').value.toUpperCase();
        const c=document.createElement('canvas'); c.width=800; c.height=600; const ctx=c.getContext('2d');
        ctx.fillStyle='#000'; ctx.fillRect(0,0,800,600); ctx.font='22px Courier New'; ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent');
        ctx.fillText('STATE: ' + label + ' | PHILOSOPHY: ' + m, 30, 40); ctx.drawImage(document.getElementById('c1'), 0, 60); ctx.drawImage(document.getElementById('c2'), 0, 240); ctx.drawImage(document.getElementById('c3'), 0, 420);
        const a=document.createElement('a'); a.href=c.toDataURL(); a.download=m + '_' + label + '.png'; a.click();
    }

    function exportCSV() {
        let csv = "Event,Shard,Temporal,Space,Texture,Destruct,Pre,Post\n";
        document.querySelectorAll("#logBody tr").forEach(tr => { csv += Array.from(tr.querySelectorAll("td")).map(td => td.innerText).join(",") + "\n"; });
        const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download='Research_Data.csv'; a.click();
    }
    updatePhilosophy(); animate();
</script>
</body>
</html>
