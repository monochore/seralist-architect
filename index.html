<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMP602: Oracle & Architect v14.0</title>
    <style>
        :root { --bg: #050505; --panel: #111; --text: #888; --border: #222; --accent: #00e5ff; }
        .theme-cyan { --accent: #00e5ff; } .theme-amber { --accent: #ffb300; } .theme-green { --accent: #39ff14; } .theme-magenta { --accent: #ff00ff; }
        body.cologne-theme { --bg: #03080a; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 30px 30px; }
        body.paris-theme { --bg: #0d0a08; }
        body.paris-theme::before { content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 100; opacity: 0.3; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.3s ease; }
        .container { max-width: 1400px; width: 100%; display: grid; grid-template-columns: 480px 1fr; gap: 30px; }
        .module { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 12px; border-top: 6px solid var(--accent); box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; }
        h1, h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 4px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin: 0 0 25px 0; text-shadow: 0 0 15px var(--accent); }
        label { display: block; font-size: 0.65rem; margin-bottom: 8px; color: var(--accent); font-weight: 900; text-transform: uppercase; }
        input[type=range] { width: 100%; margin-bottom: 20px; accent-color: var(--accent); cursor: crosshair; }
        input[type=text], select { background: #000; color: var(--accent); border: 1px solid var(--border); padding: 14px; width: calc(100% - 32px); margin-bottom: 15px; font-family: inherit; font-size: 0.85rem; outline: none; }
        button { background: #111; color: var(--accent); border: 2px solid var(--accent); padding: 16px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.1s; box-shadow: 0 6px 0 #000; border-radius: 4px; margin-top: 10px; }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; filter: brightness(1.3); }
        button.action { background: var(--accent); color: #000; }
        .viz-stack { display: grid; grid-template-rows: repeat(3, 160px); gap: 15px; margin-bottom: 15px; }
        canvas { background: #000; border: 1px solid #222; width: 100%; height: 100%; border-radius: 6px; }
        .hud-panel { background: #000; border: 2px solid var(--accent); padding: 25px; margin-top: 25px; border-radius: 8px; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,1); }
        .hud-step { margin-bottom: 15px; font-size: 0.9rem; color: #fff; line-height: 1.4; }
        .hud-step b { color: var(--accent); text-transform: uppercase; display: block; font-size: 0.7rem; border-bottom: 1px solid #222; margin-bottom: 5px; }
        .hud-target { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px var(--accent); }
        .matrix-table { width: 100%; font-size: 0.7rem; border-collapse: collapse; margin-top: 30px; background: #000; }
        .matrix-table th { background: #1a1a1a; color: var(--accent); padding: 15px; border: 1px solid var(--border); text-align: left; }
        .matrix-table td { border: 1px solid var(--border); padding: 15px; color: #eee; }
        .active-row { border-left: 6px solid var(--accent) !important; background: rgba(255,255,255,0.05); }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }
        .shaking { animation: shake 0.1s infinite; }
    </style>
</head>
<body class="cologne-theme theme-cyan">

<h1 style="margin-bottom: 40px;">EMP602: ORACLE & ARCHITECT v14.0</h1>

<div class="container">
    <div class="module" id="oracle-mod">
        <h2>I. THE ORACLE</h2>
        <label>ONSET</label><input type="range" min="0" max="100" value="15" id="onset">
        <label>MASS (SLAB)</label><input type="range" min="0" max="100" value="50" id="mass">
        <label>TERMINATION</label><input type="range" min="0" max="100" value="30" id="term">
        <label>GRIT (FRAGMENT)</label><input type="range" min="0" max="100" value="20" id="grit">
        <div class="viz-stack"><canvas id="c1"></canvas><canvas id="c2"></canvas><canvas id="c3"></canvas></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button onclick="takeSnapshot('Before')" style="font-size:0.6rem;">Capture 'Before' Profile</button>
            <button onclick="takeSnapshot('After')" style="font-size:0.6rem;">Capture 'After' Profile</button>
        </div>
    </div>
    <div class="module">
        <h2>II. THE ARCHITECT</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div>
                <label>PHILOSOPHY</label><select id="mode" onchange="updatePhilosophy()"><option value="cologne">Cologne (Surgical)</option><option value="paris">Paris (Materialist)</option></select>
                <label>COLOR PALETTE</label><select id="palette" onchange="updateColors()"></select>
                <label>SHARD NAME</label><input id="shardName" placeholder="e.g. MS20_LOOP_01">
                <label>PRE-PROCESS STATE</label><select id="preState"><option>Glassy/Pure</option><option>Static/Heavy</option><option>Rough/Fragmented</option><option>Unstable/Liquid</option></select>
            </div>
            <div>
                <label>P1: SPACE PLUGIN</label><input id="p1" placeholder="Plugin Name"><label>P2: TEXTURE PLUGIN</label><input id="p2" placeholder="Plugin Name"><label>P3: DESTRUCT PLUGIN</label><input id="p3" placeholder="Plugin Name">
            </div>
        </div>
        <button class="action" id="rollBtn" onclick="roll()">ROLL COMPOSITIONAL LAW</button>
        <div class="hud-panel" id="hud">
            <h2>SYSTEM TARGET DECODER</h2>
            <div id="hud-body" style="color:#666; font-size:0.8rem;">AWAITING SIGNAL INITIALIZATION...</div>
        </div>
        <div id="capturePanel" style="display:none; border:2px solid var(--accent); padding:15px; margin-top:15px; border-radius:8px;">
            <label>POST-PROCESS OBSERVATION:</label><select id="postState"><option>Eroded</option><option>Dissolved</option><option>Solidified</option><option>Shattered</option><option>Purified</option></select>
            <button onclick="commitLog()" class="action">COMMIT TO RESEARCH LOG</button>
        </div>
        <button onclick="exportCSV()" style="margin-top:25px; font-size:0.7rem; color:#555; border-color:#333;">Export Research Data (.csv)</button>
    </div>
</div>
<table class="matrix-table"><thead><tr><th>#</th><th>Shard</th><th>Temporal Law</th><th>P1 (Space)</th><th>P2 (Texture)</th><th>P3 (Destruct)</th><th>Pre</th><th>Post</th></tr></thead><tbody id="logBody"></tbody></table>

<script>
    const colPal = {"Cyan":"#00e5ff","Lab Green":"#39ff14","UV Violet":"#bc13fe","Cold White":"#f0f0f0"}, parPal = {"Oxide Red":"#ff4500","Toxic Amber":"#ffb300","Carbon Grey":"#777777","Burnt Orange":"#cc5500"};
    const spaceLaws = [["VACUUM", "Eliminate all sense of space. Total dry signal."], ["DIFFUSE", "Create a wide, blurry, non-directional wash."], ["PROXIMATE", "Make the sound feel like it's touching the listener's ear."], ["STEREOTONIC", "Place in a razor-sharp fixed binaural coordinate."]];
    const textureLaws = [["FRACTURED", "Make the sound feel broken, glitched, or intermittent."], ["UNIFORM", "Achieve a consistent, stable, and polished texture."], ["LIQUID", "Create a fluid, moving, and evolving internal grain."], ["SPECTRAL THIN", "Carve out all frequencies except a narrow band."]];
    const destructLaws = [["PRISTINE", "Zero artifacts. Absolute clarity and precision."], ["ERODED", "Make the signal feel old, worn, or low-fidelity."], ["ANNIHILATED", "Push processing until the sound is unrecognizable noise."], ["RESONANT", "Crank internal feedback until the plugin 'rings'."]];
    const tempLaws = ["SUCCESSION: Place after tail.", "INTERCALATION: Overlap 50%.", "SUPERIMPOSITION: Layer directly."];

    let currentRoll = null, time = 0, eventCount = 0; const waterfall = [];

    function updatePhilosophy() {
        const m = document.getElementById('mode').value; document.body.className = m + '-theme';
        const palSelect = document.getElementById('palette'); palSelect.innerHTML = '';
        const list = m === 'cologne' ? colPal : parPal;
        for (let n in list) { let opt = document.createElement('option'); opt.value = list[n]; opt.innerText = n; palSelect.appendChild(opt); }
        updateColors();
    }
    function updateColors() { document.documentElement.style.setProperty('--accent', document.getElementById('palette').value); }

    function animate() {
        time += 0.05;
        const o=document.getElementById('onset').value/100, m=document.getElementById('mass').value/100, t=document.getElementById('term').value/100, g=document.getElementById('grit').value/100;
        const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
        const mode = document.getElementById('mode').value;

        if(mode === 'paris' && g > 0.7) document.getElementById('oracle-mod').classList.add('shaking');
        else document.getElementById('oracle-mod').classList.remove('shaking');

        const ctx1 = document.getElementById('c1').getContext('2d');
        const w=800, h=160; ctx1.canvas.width=w; ctx1.canvas.height=h;
        ctx1.clearRect(0,0,w,h); ctx1.strokeStyle=accent; ctx1.lineWidth=mode==='cologne'?2+m*4:3;
        if(mode==='cologne'){ctx1.shadowBlur=(m+o)*25; ctx1.shadowColor=accent;}
        ctx1.beginPath();
        for(let x=0; x<w; x++){
            let p=x/w, env=1; if(p<o) env=p/o; else if(p>1-t) env=(1-p)/t;
            let move = mode === 'cologne' ? time*4 : time;
            let jitter = (Math.random()-0.5)*g*60*env;
            let y = h/2 + Math.sin(move + x/(25-m*20))*(m*60*env) + jitter;
            if(x==0) ctx1.moveTo(x,y); else ctx1.lineTo(x,y);
        }
        ctx1.stroke();

        const ctx2 = document.getElementById('c2').getContext('2d');
        ctx2.canvas.width=w; ctx2.canvas.height=h; ctx2.clearRect(0,0,w,h);
        const frame = Array.from({length: 40}, () => (Math.random() < m ? Math.random() : 0));
        waterfall.unshift(frame); if(waterfall.length > 32) waterfall.pop();
        waterfall.forEach((row, yPos) => {
            row.forEach((val, xPos) => {
                if(val > 0) {
                    let slabWidth = (m*80) * (1-g*0.9);
                    let drift = (Math.random()-0.5)*g*200;
                    ctx2.fillStyle = accent; ctx2.globalAlpha = val * (1-yPos/32);
                    ctx2.fillRect(xPos*(w/40) + drift, yPos*5, Math.max(2, slabWidth), 4);
                }
            });
        });

        const ctx3 = document.getElementById('c3').getContext('2d');
        ctx3.canvas.width=w; ctx3.canvas.height=h; ctx3.clearRect(0,0,w,h);
        const pulse = 1 + Math.sin(time*2)*0.05;
        ctx3.fillStyle = accent; ctx3.globalAlpha = 0.15; ctx3.beginPath();
        for(let x=0; x<w; x++){
            let p=x/w, env=1; if(p<o) env=p/o; else if(p>1-t) env=(1-p)/t;
            ctx3.lineTo(x, h/2 - (env*m*h*0.4*pulse));
        }
        for(let x=w; x>=0; x--){
            let p=x/w, env=1; if(p<o) env=p/o; else if(p>1-t) env=(1-p)/t;
            ctx3.lineTo(x, h/2 + (env*m*h*0.4*pulse));
        }
        ctx3.fill();
        requestAnimationFrame(animate);
    }

    function roll() {
        const shard=document.getElementById('shardName').value||"SHARD", p1=document.getElementById('p1').value||"P1", p2=document.getElementById('p2').value||"P2", p3=document.getElementById('p3').value||"P3";
        const r1=Math.floor(Math.random()*4), r2=Math.floor(Math.random()*4), r3=Math.floor(Math.random()*4);
        const sL = spaceLaws[r1], tL = textureLaws[r2], dL = destructLaws[r3];
        const temp = (eventCount === 0) ? "INITIALIZE: Start of Grid (00:00:00)" : tempLaws[Math.floor(Math.random()*3)];

        currentRoll = {shard, t:temp, p1:sL[0], p2:tL[0], p3:dL[0], pre:document.getElementById('preState').value};

        document.getElementById('hud-body').innerHTML = `
            <div class="hud-step"><b>Temporal Law:</b> ${temp}</div>
            <div class="hud-step"><b>P1 Space (${p1}):</b> Target State: <span class="hud-target">${sL[0]}</span><br>${sL[1]}</div>
            <div class="hud-step"><b>P2 Texture (${p2}):</b> Target State: <span class="hud-target">${tL[0]}</span><br>${tL[1]}</div>
            <div class="hud-step"><b>P3 Destruct (${p3}):</b> Target State: <span class="hud-target">${dL[0]}</span><br>${dL[1]}</div>
        `;
        document.getElementById('capturePanel').style.display='block'; document.getElementById('rollBtn').disabled=true;
    }

    function commitLog() {
        eventCount++;
        const row = `<tr class="active-row"><td>${eventCount}</td><td>${currentRoll.shard}</td><td>${currentRoll.t}</td><td>${currentRoll.p1}</td><td>${currentRoll.p2}</td><td>${currentRoll.p3}</td><td>${currentRoll.pre}</td><td>${document.getElementById('postState').value}</td></tr>`;
        document.getElementById('logBody').insertAdjacentHTML('afterbegin', row);
        document.getElementById('capturePanel').style.display='none'; document.getElementById('rollBtn').disabled=false;
    }

    function takeSnapshot(label) {
        const c=document.createElement('canvas'); c.width=800; c.height=550; const ctx=c.getContext('2d');
        ctx.fillStyle='#000'; ctx.fillRect(0,0,800,550); ctx.font='20px Courier'; ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent');
        ctx.fillText('STATE: '+label, 20, 30); ctx.drawImage(document.getElementById('c1'), 0, 50); ctx.drawImage(document.getElementById('c2'), 0, 220); ctx.drawImage(document.getElementById('c3'), 0, 390);
        const a=document.createElement('a'); a.href=c.toDataURL(); a.download=label+'.png'; a.click();
    }

    function exportCSV() {
        let csv = "Event,Shard,Temporal,Space,Texture,Destruct,Pre,Post\n";
        document.querySelectorAll("#logBody tr").forEach(tr => { csv += Array.from(tr.querySelectorAll("td")).map(td => td.innerText).join(",") + "\n"; });
        const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download='Research_Data.csv'; a.click();
    }
    updatePhilosophy(); animate();
</script>
</body>
</html>
