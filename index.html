<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMP602: Oracle & Architect _ Final Build</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0c0c0e; --panel: #16161a; --text: #a0a0a5; --border: #2a2a2e; --accent: #00d4ff; 
            --panel-shadow: inset 0 1px 1px rgba(255,255,255,0.05), 0 20px 40px rgba(0,0,0,0.4);
        }
        .theme-cyan { --accent: #00d4ff; } .theme-amber { --accent: #ff9f00; } 
        .theme-green { --accent: #32ff7e; } .theme-magenta { --accent: #ff3e60; }

        body { 
            background: var(--bg); color: var(--text); font-family: 'Roboto Mono', monospace; 
            margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; 
        }

        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 9999;
        }

        .container { max-width: 1400px; width: 100%; display: grid; grid-template-columns: 420px 1fr; gap: 40px; }

        .module { 
            background: var(--panel); border: 1px solid var(--border); padding: 40px; 
            border-radius: 4px; border-left: 4px solid var(--accent); box-shadow: var(--panel-shadow);
        }

        h1, h2 { color: #fff; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin: 0 0 30px 0; }
        label { display: block; font-size: 0.6rem; margin-bottom: 12px; color: var(--accent); font-weight: 700; letter-spacing: 2px; }

        input[type=range] { width: 100%; margin-bottom: 30px; accent-color: var(--accent); background: #000; height: 4px; appearance: none; cursor: crosshair; }
        input[type=text], select { background: #000; color: #fff; border: 1px solid var(--border); padding: 14px; width: calc(100% - 30px); margin-bottom: 20px; font-family: inherit; font-size: 0.8rem; outline: none; }

        button { 
            background: #222; color: #fff; border: 1px solid #333; padding: 16px; width: 100%; font-weight: 700; cursor: pointer; text-transform: uppercase; 
            transition: 0.1s; border-radius: 2px; box-shadow: 0 4px 0 #000; margin-top: 15px; font-size: 0.75rem; letter-spacing: 2px;
        }
        button:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }
        button.action { background: var(--accent); color: #000; border: none; }

        .viz-stack { display: grid; grid-template-rows: repeat(3, 160px); gap: 20px; margin-bottom: 15px; }
        canvas { background: #050505; border: 1px solid #1a1a1e; width: 100%; height: 100%; }

        /* THE HUD - DECODER RESTORED */
        .hud-panel { background: #000; border: 1px solid var(--border); padding: 30px; margin-top: 30px; position: relative; }
        .hud-step { margin-bottom: 15px; font-size: 0.8rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .hud-step b { color: var(--accent); display: block; margin-bottom: 4px; font-size: 0.6rem; text-transform: uppercase; }
        .hud-target { font-size: 1.3rem; font-weight: 700; color: #fff; text-shadow: 0 0 10px var(--accent); }

        .matrix-table { width: 100%; font-size: 0.65rem; border-collapse: collapse; margin-top: 50px; }
        .matrix-table th { background: #000; color: var(--accent); padding: 15px; border: 1px solid var(--border); text-align: left; }
        .matrix-table td { border: 1px solid var(--border); padding: 15px; color: #888; }
        .active-row { background: rgba(255,255,255,0.02); color: #fff !important; }
        
        @keyframes drift { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        .shaking { animation: drift 0.1s infinite; }
    </style>
</head>
<body class="cologne-theme theme-cyan">

<div class="noise"></div>

<h1 style="color:var(--accent); margin-bottom: 50px; font-size: 0.8rem; letter-spacing: 5px;">SYS: ORACLE_ARCHITECT_FINAL</h1>

<div class="container">
    <div class="module" id="oracle-mod">
        <h2>01. SOURCE_ANALYSIS</h2>
        <label>ONSET_VELOCITY</label><input type="range" min="0" max="100" value="15" id="onset">
        <label>MASS_DENSITY</label><input type="range" min="0" max="100" value="50" id="mass">
        <label>DECAY_TERMINATION</label><input type="range" min="0" max="100" value="30" id="term">
        <label>GRIT_FRAGMENTATION</label><input type="range" min="0" max="100" value="20" id="grit">
        <div class="viz-stack"><canvas id="c1"></canvas><canvas id="c2"></canvas><canvas id="c3"></canvas></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button onclick="takeSnapshot('PRE')">Capture PRE</button><button onclick="takeSnapshot('POST')">Capture POST</button>
        </div>
    </div>

    <div class="module">
        <h2>02. COMMAND_LOGIC</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:25px;">
            <div>
                <label>PHILOSOPHY</label><select id="mode" onchange="updatePhilosophy()"><option value="cologne">Cologne</option><option value="paris">Paris</option></select>
                <label>PALETTE_ID</label><select id="palette" onchange="updateColors()"></select>
                <label>SIGNAL_ID</label><input id="shardName" placeholder="e.g. MS20_SAW_01">
                <label>PRE_STATE</label><select id="preState"><option>Pure</option><option>Heavy</option><option>Rough</option><option>Liquid</option></select>
            </div>
            <div>
                <label>P1_SPACE</label><input id="p1" placeholder="Plugin ID"><label>P2_TEXTURE</label><input id="p2" placeholder="Plugin ID"><label>P3_DESTRUCT</label><input id="p3" placeholder="Plugin ID">
            </div>
        </div>

        <button class="action" id="rollBtn" onclick="roll()">EXECUTE COMPOSITIONAL ROLL</button>
        <div class="hud-panel" id="hud">
            <h2>DECODER_READOUT</h2>
            <div id="hud-body" style="color:#555; font-size:0.75rem;">AWAITING SIGNAL DATA...</div>
        </div>

        <div id="capturePanel" style="display:none; border-top:1px solid #333; padding-top:20px; margin-top:20px;">
            <label>POST_OBSERVATION</label>
            <select id="postState"><option>Eroded</option><option>Dissolved</option><option>Solidified</option><option>Shattered</option><option>Purified</option></select>
            <button onclick="commitLog()" class="action">COMMIT_TO_LOG</button>
        </div>
        <button onclick="exportCSV()" style="margin-top:40px; border:none; color:#444; font-size:0.6rem; background:none; text-decoration:underline;">EXPORT_DATA_ARRAY</button>
    </div>
</div>

<table class="matrix-table">
    <thead>
        <tr><th>#</th><th>Signal</th><th>Temporal</th><th>P1_Space</th><th>P2_Text</th><th>P3_Dest</th><th>Pre</th><th>Post</th></tr>
    </thead>
    <tbody id="logBody"></tbody>
</table>

<script>
    const colPal = {"Cyan":"#00d4ff","Green":"#32ff7e","UV":"#bc13fe","White":"#f0f0f0"}, parPal = {"Red":"#ff3e60","Amber":"#ff9f00","Grey":"#777777","Orange":"#cc5500"};
    const spaceLaws = [["ANCHOIC", "Total dead signal. No environmental footprint."], ["DIFFUSE", "Non-directional wash. Blurry energy."], ["INTIMATE", "Near-field periphonic space. Close to ear."], ["POINT-SOURCE", "Fixed, sharp, single coordinate."]];
    const textureLaws = [["FRACTURED", "Broken, glitched, intermittent grain."], ["CONTINUANT", "Steady-state spectral density."], ["ITERATIVE", "Rapidly repeated elements (e.g. rain)."], ["HOLLOW", "Spectral body removed; edges only."]];
    const destructLaws = [["PRISTINE", "Zero artifacts. Absolute clarity."], ["ERODED", "Material failure. Old, worn, low-fi."], ["SATURATED", "Total harmonic distortion. Excess energy."], ["TONAL-NOISE", "Noise forced into self-oscillation."]];
    const tempLaws = ["LINEAR SUCCESSION: Place end-to-end.", "ELIDED OVERLAP: Seamless transition.", "VERTICAL STRATIFICATION: Layered stratum."];

    let currentRoll = null, time = 0, eventCount = 0; const waterfall = [];

    function updatePhilosophy() {
        const m = document.getElementById('mode').value; document.body.className = m + '-theme';
        const palSelect = document.getElementById('palette'); palSelect.innerHTML = '';
        const list = m === 'cologne' ? colPal : parPal;
        for (let n in list) { let opt = document.createElement('option'); opt.value = list[n]; opt.innerText = n; palSelect.appendChild(opt); }
        updateColors();
    }
    function updateColors() { document.documentElement.style.setProperty('--accent', document.getElementById('palette').value); }

    function animate() {
        time += 0.05;
        const o=document.getElementById('onset').value/100, m=document.getElementById('mass').value/100, t=document.getElementById('term').value/100, g=document.getElementById('grit').value/100;
        const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
        const mode = document.getElementById('mode').value;
        const c1 = document.getElementById('c1').getContext('2d');
        const w=800, h=160; c1.canvas.width=w; c1.canvas.height=h;
        c1.clearRect(0,0,w,h); c1.strokeStyle=accent; c1.lineWidth=1.5+m*4;
        c1.beginPath();
        for(let x=0; x<w; x++){
            let p=x/w, env=1; if(p<o) env=p/o; else if(p>1-t) env=(1-p)/t;
            let move = mode === 'cologne' ? time*4.5 : time*1.2;
            let noise = mode === 'paris' ? (Math.random()-0.5)*g*60*env : 0;
            let y = h/2 + Math.sin(move + x/(25-m*20))*(m*60*env) + noise;
            if(x==0) c1.moveTo(x,y); else c1.lineTo(x,y);
        }
        c1.stroke();

        const c2 = document.getElementById('c2').getContext('2d');
        c2.canvas.width=w; c2.canvas.height=h; c2.clearRect(0,0,w,h);
        const frame = Array.from({length: 40}, () => (Math.random() < m ? Math.random() : 0));
        waterfall.unshift(frame); if(waterfall.length > 30) waterfall.pop();
        waterfall.forEach((row, yPos) => {
            row.forEach((val, xPos) => {
                if(val > 0) {
                    let slabW = (m*100) * (1-g*0.9);
                    let drift = (Math.random()-0.5)*g*240;
                    c2.fillStyle = accent; c2.globalAlpha = val * (1-yPos/30);
                    c2.fillRect(xPos*(w/40) + drift, yPos*5.5, Math.max(1, slabW), 5);
                }
            });
        });

        const c3 = document.getElementById('c3').getContext('2d');
        c3.canvas.width=w; c3.canvas.height=h; c3.clearRect(0,0,w,h);
        const pulse = 1 + Math.sin(time*2.5)*0.1;
        c3.fillStyle = accent; c3.globalAlpha = 0.15; c3.beginPath();
        for(let x=0; x<w; x++){
            let p=x/w, env=1; if(p<o) env=p/o; else if(p>1-t) env=(1-p)/t;
            c3.lineTo(x, h/2 - (env*m*h*0.4*pulse));
        }
        for(let x=w; x>=0; x--){
            let p=x/w, env=1; if(p<o) env=p/o; else if(p>1-t) env=(1-p)/t;
            c3.lineTo(x, h/2 + (env*m*h*0.4*pulse));
        }
        c3.fill();
        requestAnimationFrame(animate);
    }

    function roll() {
        const shard=document.getElementById('shardName').value||"UNIDENTIFIED", p1=document.getElementById('p1').value||"P1", p2=document.getElementById('p2').value||"P2", p3=document.getElementById('p3').value||"P3";
        const r1=Math.floor(Math.random()*4), r2=Math.floor(Math.random()*4), r3=Math.floor(Math.random()*4);
        const sL=spaceLaws[r1], tL=textureLaws[r2], dL=destructLaws[r3];
        const temp = (eventCount === 0) ? "INITIAL_POSITION [00:00]" : tempLaws[Math.floor(Math.random()*3)];
        
        currentRoll = {shard, t:temp, p1:sL[0], p2:tL[0], p3:dL[0], pre:document.getElementById('preState').value};

        document.getElementById('hud-body').innerHTML = `
            <div class="hud-step"><b>Temporal Strategy:</b> ${temp}</div>
            <div class="hud-step"><b>P1 Space (${p1}):</b> Target: <span class="hud-target">${sL[0]}</span><br>${sL[1]}</div>
            <div class="hud-step"><b>P2 Texture (${p2}):</b> Target: <span class="hud-target">${tL[0]}</span><br>${tL[1]}</div>
            <div class="hud-step"><b>P3 Destruct (${p3}):</b> Target: <span class="hud-target">${dL[0]}</span><br>${dL[1]}</div>
        `;
        document.getElementById('capturePanel').style.display='block'; document.getElementById('rollBtn').disabled=true;
    }

    function commitLog() {
        eventCount++;
        const row = `<tr class="active-row"><td>${eventCount}</td><td>${currentRoll.shard}</td><td>${currentRoll.t}</td><td>${currentRoll.p1}</td><td>${currentRoll.p2}</td><td>${currentRoll.p3}</td><td>${currentRoll.pre}</td><td>${document.getElementById('postState').value}</td></tr>`;
        document.getElementById('logBody').insertAdjacentHTML('afterbegin', row);
        document.getElementById('capturePanel').style.display='none'; document.getElementById('rollBtn').disabled=false;
    }

    function takeSnapshot(label) {
        const m = document.getElementById('mode').value.toUpperCase();
        const c=document.createElement('canvas'); c.width=800; c.height=600; const ctx=c.getContext('2d');
        ctx.fillStyle='#000'; ctx.fillRect(0,0,800,600); ctx.font='18px Roboto Mono'; ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent');
        ctx.fillText('REF_ID: ' + label + ' | SYS: ' + m, 30, 40); ctx.drawImage(document.getElementById('c1'), 0, 60); ctx.drawImage(document.getElementById('c2'), 0, 240); ctx.drawImage(document.getElementById('c3'), 0, 420);
        const a=document.createElement('a'); a.href=c.toDataURL(); a.download=label + '.png'; a.click();
    }

    function exportCSV() {
        let csv = "Event,Signal,Temporal,Space,Text,Dest,Pre,Post\n";
        document.querySelectorAll("#logBody tr").forEach(tr => { csv += Array.from(tr.querySelectorAll("td")).map(td => td.innerText).join(",") + "\n"; });
        const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download='DataLog.csv'; a.click();
    }
    updatePhilosophy(); animate();
</script>
</body>
</html>
